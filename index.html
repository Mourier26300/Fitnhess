<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Fitness — architecture v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5ead8; --surface:#ebddc5; --text:#201e1d;
  --orange-100:#fff2eb; --orange-200:#ffe1d0; --orange-300:#ffc6a5; --orange:#c67139; --orange-500:#d67f48; --orange-600:#b2622d; --orange-800:#643312;
  --olive-100:#f0fae1; --olive-200:#e1eecc; --olive:#7a8a5e; --olive-600:#728157; --olive-800:#3d472b;
  --n-100:#f9f4ed; --n-200:#eee7db; --n-300:#dcd3c4; --n-500:#a19786; --n-600:#82796a; --n-700:#645c50; --n-900:#2e2b25;
  --r-sm:8px; --r-md:16px; --r-lg:28px; --r-pill:999px;
  --shadow-sm:0 1px 2px rgba(46,43,37,.07), 0 1px 1px rgba(46,43,37,.04);
  --shadow-md:0 6px 18px rgba(46,43,37,.10);
  --muted:var(--n-600); --line:var(--n-300); --accent-soft:var(--n-200); --warn:var(--orange-800);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Figtree',system-ui,-apple-system,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;text-wrap:pretty}
a{color:var(--orange-800)}
a:hover{color:var(--orange-600)}
:focus-visible{outline:2px solid var(--orange-600);outline-offset:2px}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
header.top{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 6px;gap:10px}
header.top h1{font-family:'Caprasimo',serif;font-size:24px;font-weight:400;letter-spacing:.01em}
main{flex:1;padding:14px 16px calc(96px + env(safe-area-inset-bottom))}
h2{font-size:12px;font-weight:700;margin:24px 0 10px;color:var(--n-600);text-transform:uppercase;letter-spacing:.07em}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);
  border-top:1px solid var(--n-300);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:50;box-shadow:0 -2px 10px rgba(46,43,37,.05)}
nav button{flex:1;background:none;border:none;font-size:10.5px;font-weight:600;color:var(--n-600);
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;cursor:pointer;min-height:44px;border-radius:var(--r-sm)}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--text);background:var(--n-200)}
nav button:active{transform:scale(.96)}
.card{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.stack{display:flex;flex-direction:column;gap:10px}
.muted{color:var(--n-600);font-size:13px}
.small{font-size:12px}
.btn{border:1px solid var(--text);background:var(--text);color:var(--bg);border-radius:var(--r-pill);padding:12px 20px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px;transition:transform .12s ease}
.btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;color:var(--text);border-color:var(--n-500)}
.btn.small{padding:8px 14px;font-size:13px;min-height:38px}
.btn.full{width:100%}
.btn.accent{background:var(--orange-600);border-color:var(--orange-600);color:#fff}
.btn.olive{background:var(--olive-600);border-color:var(--olive-600);color:#fff}
.btn.danger{border-color:transparent;background:none;color:var(--orange-600);text-decoration:underline;padding:8px;min-height:38px}
.icon-btn{background:var(--n-200);border:none;border-radius:var(--r-pill);width:30px;height:30px;font-size:16px;
  color:var(--n-600);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
input,select{font-family:inherit;font-size:16px;color:var(--text);background:var(--n-100);
  border:1px solid var(--n-300);border-radius:var(--r-sm);padding:11px 12px;width:100%;min-height:44px}
input:focus,select:focus{outline:2px solid var(--orange-600);border-color:var(--orange-600)}
label{font-size:11.5px;font-weight:600;color:var(--n-600);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.stat{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);padding:14px 12px}
.stat .v{font-family:'Caprasimo',serif;font-size:26px;font-weight:400;font-variant-numeric:tabular-nums}
.stat .l{font-size:10.5px;color:var(--n-600);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.03em}
.pill{display:inline-block;background:var(--orange-200);color:var(--orange-800);border-radius:var(--r-pill);font-size:12px;font-weight:700;padding:4px 11px}
.pill.olive{background:var(--olive-200);color:var(--olive-800)}
.seg{display:flex;background:var(--n-200);border-radius:var(--r-pill);padding:3px;margin:10px 0}
.seg button{flex:1;border:none;background:none;border-radius:var(--r-pill);padding:9px 0;font-size:13px;font-weight:600;color:var(--n-600);cursor:pointer;font-family:inherit;min-height:38px}
.seg button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.set-row{display:grid;grid-template-columns:32px 1fr 16px 1fr 32px;gap:8px;align-items:center;margin-bottom:7px}
.set-row input{text-align:center;padding:10px 4px}
.set-num{font-size:12px;font-weight:700;color:var(--olive-800);text-align:center;background:var(--olive-100);border-radius:var(--r-pill);padding:6px 0}
.set-x{text-align:center;color:var(--n-500)}
.set-hint{display:grid;grid-template-columns:32px 1fr 16px 1fr 32px;gap:8px;font-size:10.5px;color:var(--n-600);text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
details.hist{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);margin-bottom:9px}
details.hist summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;min-height:44px}
details.hist summary::-webkit-details-marker{display:none}
details.hist summary::after{content:'';width:8px;height:8px;border-right:1.8px solid var(--n-500);border-bottom:1.8px solid var(--n-500);transform:rotate(45deg);margin-left:6px;flex-shrink:0}
details.hist[open] summary::after{transform:rotate(-135deg)}
details.hist .body{padding:0 16px 14px}
.bar{height:9px;background:var(--n-200);border-radius:var(--r-pill);overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;background:var(--orange-500);border-radius:var(--r-pill);transition:width .3s ease}
.bar i.over{background:var(--orange-800)}
.macro-grid{display:grid;gap:10px;margin-top:10px}
.macro-row{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:center}
.macro-lab{font-size:13px;font-weight:700;color:var(--n-700)}
.macro-val{font-size:12px;color:var(--n-600);font-weight:600;white-space:nowrap}
.bar.prot i{background:var(--olive-600)}
.bar.gluc i{background:var(--orange-500)}
.bar.lip i{background:#b98a3e}
.bar.macro{margin-top:0}
.entry{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--n-300);font-size:14px}
.entry:last-child{border-bottom:none}
.finish-bar{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:448px;z-index:40;display:flex;flex-direction:column;gap:6px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);
  padding:11px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;box-shadow:var(--shadow-md)}
.toast.show{opacity:1}
.empty{border:1.5px dashed var(--n-300);border-radius:var(--r-md);padding:26px 18px;text-align:center;color:var(--n-600);font-size:14px;margin-bottom:10px}
.chart{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);padding:14px;color:var(--olive-600)}
.ai-note{font-size:12px;color:var(--n-600);margin-top:6px;line-height:1.4}
.hero-cal{background:linear-gradient(160deg,var(--orange-100),var(--surface));border:1px solid var(--orange-300);border-radius:var(--r-lg);padding:20px;margin-bottom:12px}
.hero-cal .v{font-family:'Caprasimo',serif;font-size:38px;line-height:1;margin-top:4px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:var(--n-200);color:var(--n-700);font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r-pill)}
@media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>
<div id="app">
  <header class="top"><h1 id="title"></h1><button class="btn ghost small" onclick="goTab('reglages')"><svg width="16" height="16" viewBox="0 0 24 24" style="stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;margin-right:5px" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"></path></svg>Réglages</button></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<div class="toast" id="toast"></div>
<datalist id="exo-suggestions"></datalist>
<datalist id="food-suggestions"></datalist>

<script>
/* =========================================================
   STOCKAGE — window.storage (artifact Claude) sinon localStorage.
   Sauvegarde regroupée (debounce) pour respecter les limites de requêtes.
========================================================= */
const Store = (() => {
  const KEY = 'fitness-state-v2';
  const hasWS = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  async function load(){
    if (hasWS){ try { const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : null; } catch(e){ return null; } }
    try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch(e){ return null; }
  }
  async function save(state){
    const s = JSON.stringify(state);
    if (hasWS){ try { await window.storage.set(KEY, s); } catch(e){ console.warn('storage', e); } return; }
    try { localStorage.setItem(KEY, s); } catch(e){ console.warn('storage', e); }
  }
  return { load, save, mode: hasWS ? 'Claude (compte)' : 'appareil (localStorage)' };
})();

/* =========================================================
   ÉTAT
========================================================= */
let S = {
  settings: { sexe:'H', age:null, taille:null, objectifPoids:null, activite:1.55, rythme:-300,
              protGkg:1.8, lipPct:30, geminiKey:'', geminiModel:'gemini-2.5-flash-lite' },
  weights: [],    // {date:'YYYY-MM-DD', kg}
  templates: [],  // muscu — {id,name,exercises:[string]}
  workouts: [],   // {id,templateId,templateName,date ISO,exercises:[{name,sets:[{reps,weight}]}]}
  draft: null,
  runs: [],       // {id,date:'YYYY-MM-DD',km,dureeMin,calories,source}
  foods: [],      // bibliothèque — {id,name,basis:'100g'|'portion',kcal,p,g,l}
  meals: [],      // journal — {id,date:'YYYY-MM-DD',meal,name,qty,unit,kcal,p,g,l}
  health: [],     // {date:'YYYY-MM-DD',sommeilH,pas,calOut}
  coach: []       // messages {role:'user'|'coach', content, date}
};
let view = { tab:'accueil', screen:'home', payload:null };
let ui = { nutriDate: localDate(), dashPeriod:'jour', addTo:null, photoRows:null, stravaDraft:null, offResults:null, coachBusy:false };

const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
function localDate(d){ d=d||new Date(); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
const fmtDay = iso => new Date(iso+(iso.length===10?'T12:00':'')).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
const round1 = x => Math.round(x*10)/10;
/* clavier iPhone FR : accepter la virgule décimale */
const num = v => { const n = parseFloat(String(v??'').replace(',','.')); return isNaN(n) ? null : n; };
const geminiModel = () => (S.settings.geminiModel || 'gemini-2.5-flash-lite');

/* sauvegarde regroupée */
let saveTimer = null;
function persistSoon(){ clearTimeout(saveTimer); saveTimer = setTimeout(persist, 1500); }
async function persist(){ clearTimeout(saveTimer); await Store.save(S); }
window.addEventListener('beforeunload', ()=>{ if(saveTimer) persist(); });
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden' && saveTimer) persist(); });

/* =========================================================
   CALCULS OBJECTIFS (locaux, aucun appel IA)
   BMR Mifflin-St Jeor, TDEE = BMR x facteur, cible = TDEE + rythme
========================================================= */
function profilIncomplet(){ const s=S.settings; return !currentWeight() || !s.age || !s.taille; }
function currentWeight(){ const w=[...S.weights].sort((a,b)=>b.date.localeCompare(a.date))[0]; return w?w.kg:null; }
function bmr(){
  const st=S.settings, p=currentWeight();
  if(!p||!st.age||!st.taille) return null;
  return Math.round(10*p + 6.25*st.taille - 5*st.age + (st.sexe==='H'?5:-161));
}
function tdee(){ const b=bmr(); return b?Math.round(b*S.settings.activite):null; }
/* Cible dynamique : kcal réellement brûlées (Fitbit, onglet Santé) + rythme quand disponibles,
   sinon dépense estimée (Mifflin-St Jeor x activité) + rythme. */
function kcalTarget(date){
  date = date || localDate();
  const rythme = +S.settings.rythme||0;
  const h = S.health.find(x=>x.date===date);
  if(h && h.calOut) return { kcal: Math.max(1200, Math.round(h.calOut + rythme)), mode:'fitbit' };
  const t = tdee();
  return t ? { kcal: Math.max(1200, t + rythme), mode:'estime' } : null;
}
/* Macros : protéines en g/kg de poids (1.6-2.2 g/kg selon les méta-analyses),
   lipides en % des kcal, glucides = le reste. */
function macroTargets(date){
  const kt = kcalTarget(date); const poids = currentWeight();
  if(!kt || !poids) return null;
  const p = Math.round(poids * (+S.settings.protGkg||1.8));
  const l = Math.round(kt.kcal * (+S.settings.lipPct||30)/100/9);
  const g = Math.max(0, Math.round((kt.kcal - p*4 - l*9)/4));
  return { p, g, l };
}
/* Dépense observée : à partir de l'évolution réelle du poids et des kcal journalisées
   (1 kg de tissu ~ 7700 kcal). Fiable seulement avec un journal régulier. */
function observedTDEE(){
  const ws=[...S.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(ws.length<2) return null;
  const first=ws[0], last=ws[ws.length-1];
  const days=Math.round((new Date(last.date)-new Date(first.date))/86400000);
  if(days<10) return null;
  const logged=[...new Set(S.meals.filter(m=>m.date>=first.date&&m.date<=last.date).map(m=>m.date))];
  if(logged.length<Math.min(7,days*0.5)) return null;
  const avgKcal=logged.reduce((s,d)=>s+sumMeals(dayMeals(d)).kcal,0)/logged.length;
  return { tdee: Math.round(avgKcal - (last.kg-first.kg)*7700/days), days, logged: logged.length };
}

/* =========================================================
   GEMINI — deux usages seulement : photo de repas, screenshot Strava.
   Fonctionne en standalone ; dans l'aperçu artifact Claude, les appels
   externes vers Google peuvent être bloqués.
========================================================= */
async function geminiJSON(promptText, file){
  const key = S.settings.geminiKey.trim();
  if(!key){ toast('Ajoutez votre clé API Gemini dans Réglages'); return null; }
  const b64 = await new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error('lecture fichier')); r.readAsDataURL(file); });
  const body = {
    contents:[{parts:[{text:promptText},{inline_data:{mime_type:file.type||'image/png', data:b64}}]}],
    generationConfig:{ response_mime_type:'application/json', temperature:0.1 }
  };
  try{
    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+geminiModel()+':generateContent',
      { method:'POST', headers:{'Content-Type':'application/json','x-goog-api-key':key}, body:JSON.stringify(body) });
    if(!resp.ok){ toast(resp.status===404?'Modèle introuvable ('+geminiModel()+'), changez-le dans Réglages':resp.status===401||resp.status===403?'Clé refusée (vérifiez la clé et que l API Gemini est activée)':'Gemini : erreur '+resp.status); return null; }
    const data = await resp.json();
    let txt = (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
    txt = txt.replace(/```json|```/g,'').trim();
    return JSON.parse(txt);
  }catch(e){
    console.warn(e);
    toast('Appel Gemini impossible ici. Testez en fichier standalone.');
    return null;
  }
}

async function geminiText(promptText){
  const key = S.settings.geminiKey.trim();
  if(!key){ toast('Ajoutez votre clé API Gemini dans Réglages'); return null; }
  try{
    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+geminiModel()+':generateContent',
      { method:'POST', headers:{'Content-Type':'application/json','x-goog-api-key':key},
        body:JSON.stringify({ contents:[{parts:[{text:promptText}]}], generationConfig:{temperature:0.4} }) });
    if(!resp.ok){ toast(resp.status===404?'Modèle introuvable ('+geminiModel()+'), changez-le dans Réglages':resp.status===401||resp.status===403?'Clé refusée (vérifiez la clé et que l API Gemini est activée)':'Gemini : erreur '+resp.status); return null; }
    const data = await resp.json();
    return (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim() || null;
  }catch(e){ console.warn(e); toast('Appel Gemini impossible ici. Testez en fichier standalone.'); return null; }
}

/* =========================================================
   NAVIGATION / RENDU
========================================================= */
const TABS = [
  {id:'accueil', label:'Accueil'}, {id:'muscu', label:'Muscu'}, {id:'course', label:'Course'},
  {id:'sante', label:'Santé'}, {id:'nutrition', label:'Nutrition'}, {id:'coach', label:'Coach'}
];
const NAV_ICONS = {
  accueil:'<svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"></path></svg>',
  muscu:'<svg viewBox="0 0 24 24"><path d="M4 9v6M2 10v4M20 9v6M22 10v4M7 12h10"></path><rect x="5" y="8" width="3" height="8" rx="1"></rect><rect x="16" y="8" width="3" height="8" rx="1"></rect></svg>',
  course:'<svg viewBox="0 0 24 24"><path d="M3 13h3l2 6 4-12 3 8h6"></path></svg>',
  sante:'<svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 5C19 15.65 12 20 12 20Z"></path></svg>',
  nutrition:'<svg viewBox="0 0 24 24"><path d="M3 12h18a9 9 0 0 1-18 0Z"></path><path d="M12 12V4M8 6l1.5 2M16 6l-1.5 2"></path></svg>',
  coach:'<svg viewBox="0 0 24 24"><path d="M4 5h16v10H9l-4 4v-4H4Z"></path></svg>'
};
function goTab(id){ view={tab:id,screen:'home',payload:null}; render(); }
function go(screen,payload){ view.screen=screen; view.payload=payload??null; render(); }
function refreshSuggestions(){
  const ex=new Set(); S.workouts.forEach(w=>w.exercises.forEach(e=>ex.add(e.name))); S.templates.forEach(t=>t.exercises.forEach(n=>ex.add(n)));
  document.getElementById('exo-suggestions').innerHTML=[...ex].sort().map(n=>`<option value="${esc(n)}">`).join('');
  document.getElementById('food-suggestions').innerHTML=S.foods.map(f=>`<option value="${esc(f.name)}">`).join('');
}
function render(){
  refreshSuggestions();
  document.getElementById('nav').innerHTML = TABS.map(t=>
    `<button class="${view.tab===t.id?'active':''}" onclick="goTab('${t.id}')">${NAV_ICONS[t.id]}<span>${t.label}</span></button>`).join('');
  const titles={accueil:'Tableau de bord',muscu:'Muscu',course:'Course',sante:'Santé',nutrition:'Nutrition',coach:'Coach',reglages:'Objectifs & réglages'};
  document.getElementById('title').textContent = titles[view.tab]||'';
  const m=document.getElementById('main');
  if(view.tab==='accueil') m.innerHTML=dashboard();
  else if(view.tab==='muscu'){

function periodRange(){
  const now=new Date(); const start=new Date(now); start.setHours(0,0,0,0);
  if(ui.dashPeriod==='semaine'){ const d=(now.getDay()+6)%7; start.setDate(now.getDate()-d); }
  if(ui.dashPeriod==='mois'){ start.setDate(1); }
  return start;
}
function inPeriod(dateStr){ const d=new Date(dateStr.length===10?dateStr+'T12:00':dateStr); return d>=periodRange(); }
function tonnage(w){ return w.exercises.reduce((s,e)=>s+e.sets.reduce((x,st)=>x+(st.reps||0)*(st.weight||0),0),0); }
function dayMeals(date){ return S.meals.filter(m=>m.date===date); }
function sumMeals(list){ return list.reduce((a,m)=>({kcal:a.kcal+m.kcal,p:a.p+m.p,g:a.g+m.g,l:a.l+m.l}),{kcal:0,p:0,g:0,l:0}); }

/* Séries des N derniers jours (une valeur par jour, null si pas de donnée) */
function lastNDays(n){ const days=[]; for(let i=n-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(localDate(d)); } return days; }
function avg(vals){ const v=vals.filter(x=>x!=null); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; }
function kcalOfDay(d){ const list=dayMeals(d); return list.length?Math.round(sumMeals(list).kcal):null; }
function protOfDay(d){ const list=dayMeals(d); return list.length?Math.round(sumMeals(list).p):null; }
function glucOfDay(d){ const list=dayMeals(d); return list.length?Math.round(sumMeals(list).g):null; }
function lipOfDay(d){ const list=dayMeals(d); return list.length?Math.round(sumMeals(list).l):null; }
function sleepOfDay(d){ const h=S.health.find(x=>x.date===d); return h&&h.sommeilH!=null?h.sommeilH:null; }
function stepsOfDay(d){ const h=S.health.find(x=>x.date===d); return h&&h.pas!=null?h.pas:null; }
/* Découpe les jours d'un mois en semaines (lundi->dimanche) et renvoie la moyenne par semaine */
function weeklyBuckets(getter){
  const days=lastNDays(28); const buckets=[]; let cur=[], curLabel=null;
  days.forEach(d=>{ const dt=new Date(d+'T12:00'); const wd=(dt.getDay()+6)%7;
    if(wd===0||curLabel===null){ if(cur.length)buckets.push({label:curLabel,val:avg(cur)}); cur=[]; curLabel=d; }
    cur.push(getter(d)); });
  if(cur.length)buckets.push({label:curLabel,val:avg(cur)});
  return buckets;
}
function trendsSection(){
  const period=ui.dashPeriod;
  const target=kcalTarget()?kcalTarget().kcal:null;
  const mtT=macroTargets();
  const metrics=[
    {key:'kcal', label:'Calories consommées', unit:'kcal', get:kcalOfDay, ref:target, round:0},
    {key:'sleep', label:'Sommeil', unit:'h', get:sleepOfDay, ref:8, round:1},
    {key:'steps', label:'Pas', unit:'', get:stepsOfDay, ref:null, round:0}
  ];
  let out='';

  if(period==='jour'){
    // valeur du jour comparée à la moyenne des 7 derniers jours
    const today=localDate(); const week=lastNDays(7);
    const cards=metrics.map(m=>{
      const todayVal=m.get(today); const moy=avg(week.map(m.get));
      const fmt=v=>v==null?'—':(m.round?Math.round(v):round1(v)).toLocaleString('fr-FR');
      const diff=(todayVal!=null&&moy!=null)?todayVal-moy:null;
      const diffTxt=diff==null?'':`<span class="pill">${diff>=0?'+':''}${(m.round?Math.round(diff):round1(diff)).toLocaleString('fr-FR')} vs moy 7j</span>`;
      const empty=(todayVal==null&&moy==null);
      const goalTxt = m.ref!=null ? ` <span class="muted small">/ ${(m.round?Math.round(m.ref):round1(m.ref)).toLocaleString('fr-FR')} ${m.unit}</span>` : '';
      return `<div class="card"><div class="row"><b>${m.label}</b>${diffTxt}</div>
        ${empty?`<p class="muted small" style="margin-top:8px">Pas encore de données. ${['kcal','prot','gluc','lip'].includes(m.key)?'Journalisez vos repas dans Nutrition.':'Saisissez vos données dans Santé.'}</p>`
        :`<div class="row" style="margin-top:8px;align-items:flex-end">
          <div><div class="v" style="font-size:26px">${fmt(todayVal)}<span class="muted small"> ${m.unit}</span>${goalTxt}</div><div class="l">aujourd'hui</div></div>
          <div style="text-align:right"><div style="font-size:18px;font-weight:600;color:var(--n-600)">${fmt(moy)}<span class="muted small"> ${m.unit}</span></div><div class="l">moyenne 7 j</div></div>
        </div>`}</div>`;
    }).join('');
    return '<h2>Aujourd\'hui vs 7 jours</h2>'+cards;
  }

  // semaine = 7 barres quotidiennes ; mois = barres hebdomadaires (moyennes)
  const cards=metrics.map(m=>{
    let vals, labels, moy;
    if(period==='semaine'){ const days=lastNDays(7); vals=days.map(m.get); labels=days; moy=avg(vals); }
    else { const b=weeklyBuckets(m.get); vals=b.map(x=>x.val); labels=b.map(x=>x.label); moy=avg(vals); }
    const hasData=vals.some(v=>v!=null);
    const moyTxt=moy!=null?`<span class="pill">moy ${(m.round?Math.round(moy):round1(moy)).toLocaleString('fr-FR')} ${m.unit}</span>`:'';
    return `<div class="card"><div class="row"><b>${m.label}</b>${moyTxt}</div>
      ${hasData?barChart(vals, labels, m.ref, period==='mois')
        :`<p class="muted small" style="margin-top:8px">Pas encore de données. ${['kcal','prot','gluc','lip'].includes(m.key)?'Journalisez vos repas dans Nutrition.':'Saisissez vos données dans Santé.'}</p>`}</div>`;
  }).join('');
  const titre=period==='semaine'?'Tendances · 7 jours':'Tendances · 4 semaines';
  return `<h2>${titre}</h2>${cards}`;
}
/* Histogramme SVG : une barre par entrée, ligne pointillée = objectif/référence.
   weekly=true -> libellés "S1..S4" sinon dates jj/mm */
function barChart(vals, labels, ref, weekly){
  const W=320,H=120,pad=18,n=vals.length;
  const nums=vals.filter(v=>v!=null);
  if(!nums.length) return '';
  const max=Math.max(...nums, ref||0)*1.1||1;
  const gap=(W-2*pad)/n, bw=gap*(weekly?0.5:0.62);
  let bars='';
  vals.forEach((v,i)=>{
    const x=pad+i*gap+(gap-bw)/2;
    if(v==null){ bars+=`<rect x="${x.toFixed(1)}" y="${H-pad-2}" width="${bw.toFixed(1)}" height="2" rx="1" fill="var(--n-300)"/>`; return; }
    const bh=(v/max)*(H-2*pad); const y=H-pad-bh;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(2,bh).toFixed(1)}" rx="2" fill="currentColor"/>`;
  });
  let refline='';
  if(ref){ const y=H-pad-(ref/max)*(H-2*pad);
    refline=`<line x1="${pad}" y1="${y.toFixed(1)}" x2="${W-pad}" y2="${y.toFixed(1)}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>`; }
  let xlabels='';
  if(weekly){ xlabels=labels.map((l,i)=>`<text x="${(pad+i*gap+gap/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="var(--n-500)">S${i+1}</text>`).join(''); }
  else { const first=labels[0].slice(8)+'/'+labels[0].slice(5,7), last=labels[n-1].slice(8)+'/'+labels[n-1].slice(5,7);
    xlabels=`<text x="${pad}" y="${H-4}" font-size="10" fill="var(--n-500)">${first}</text><text x="${W-pad}" y="${H-4}" text-anchor="end" font-size="10" fill="var(--n-500)">${last}</text>`; }
  return `<div class="chart" style="margin-top:8px"><svg viewBox="0 0 ${W} ${H}" width="100%">
    ${refline}${bars}${xlabels}</svg></div>`;
}
function weightChart(){
  const pts=[...S.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(pts.length<2) return '';
  return `<h2>Poids</h2><div class="chart">${sparkline(pts.map(p=>p.kg))}</div>`;
}

    <h2>Volume par séance (kg)</h2><div class="chart">${sparkline(pts.map(p=>Math.round(p.vol)))}</div>`;
}
function sparkline(vals){
  const W=320,H=100,pad=16;
  if(vals.length===1)return `<svg viewBox="0 0 ${W} ${H}" width="100%"><circle cx="${W/2}" cy="${H/2}" r="4" fill="currentColor"/>
    <text x="${W/2}" y="${H/2-12}" text-anchor="middle" font-size="12" fill="var(--n-600)">${vals[0]}</text></svg>`;
  const min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const pts=vals.map((v,i)=>[pad+i*(W-2*pad)/(vals.length-1), H-pad-(v-min)/span*(H-2*pad)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">
    <path d="${path}" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="currentColor"/>`).join('')}
    <text x="${pts[0][0]}" y="${Math.min(pts[0][1]+16,H-2)}" font-size="11" fill="var(--n-600)">${vals[0]}</text>
    <text x="${pts[pts.length-1][0]}" y="${Math.max(pts[pts.length-1][1]-8,10)}" text-anchor="end" font-size="11" fill="var(--n-600)">${vals[vals.length-1]}</text></svg>`;
}

      '&fields=product_name,brands,nutriments&search_terms='+encodeURIComponent(q));

function coachContext(){
  const since=(()=>{const d=new Date();d.setDate(d.getDate()-14);return localDate(d);})();
  const poids=currentWeight(); const kt=kcalTarget(); const mt=macroTargets(); const obs=observedTDEE();
  const days={};
  S.meals.filter(m=>m.date>=since).forEach(m=>{ days[m.date]=days[m.date]||{kcal:0,p:0};
    days[m.date].kcal+=m.kcal; days[m.date].p+=m.p; });
  const nutrition=Object.entries(days).sort().map(([d,v])=>`${d}: ${Math.round(v.kcal)} kcal, P ${Math.round(v.p)} g`).join('; ')||'aucun journal';
  const wos=S.workouts.filter(w=>w.date>=since).map(w=>{
    const tops=w.exercises.map(e=>`${e.name} ${Math.max(...e.sets.map(s=>s.weight||0))}kg x${e.sets.length}s`).join(', ');
    return `${w.date.slice(0,10)} ${w.templateName} [${tops}] tonnage ${Math.round(tonnage(w))}kg`; }).join('; ')||'aucune';
  const runs=S.runs.filter(r=>r.date>=since).map(r=>`${r.date} ${r.km}km en ${r.dureeMin}min`).join('; ')||'aucune';
  const sleep=S.health.filter(h=>h.date>=since&&h.sommeilH).map(h=>`${h.date} ${h.sommeilH}h`).join('; ')||'non renseigné';
  const ws=[...S.weights].sort((a,b)=>a.date.localeCompare(b.date)).slice(-6).map(w=>`${w.date} ${w.kg}kg`).join('; ')||'non renseigné';
  return `PROFIL: ${S.settings.sexe==='H'?'homme':'femme'}, ${S.settings.age??'?'} ans, ${S.settings.taille??'?'} cm, poids ${poids??'?'} kg, objectif ${S.settings.objectifPoids??'?'} kg, rythme ${S.settings.rythme} kcal/j, cible ${kt?kt.kcal+' kcal ('+kt.mode+')':'non calculée'}${mt?`, macros cibles P${mt.p}/G${mt.g}/L${mt.l} g`:''}${obs?`, dépense observée ~${obs.tdee} kcal (${obs.days} j)`:''}.
POIDS: ${ws}
MUSCU 14 j: ${wos}
COURSE 14 j: ${runs}
NUTRITION 14 j: ${nutrition}
SOMMEIL 14 j: ${sleep}`;
}
const COACH_RULES=`Tu es un coach sportif et nutrition factuel. Réponds en français, concis (max 200 mots), tutoiement, sans emojis.
Appuie-toi UNIQUEMENT sur les données fournies et sur ces repères issus de la littérature scientifique:
- Protéines: 1.6 à 2.2 g/kg/jour avec entraînement en résistance, plutôt haut de fourchette en déficit calorique.
- Perte de poids durable: 0.25 à 1 % du poids corporel par semaine; au-delà, risque de perte musculaire.
- Progression muscu: surcharge progressive (quand toutes les séries atteignent le haut de la fourchette de reps, augmenter la charge de ~2.5 kg).
- Sommeil: 7 à 9 h par nuit; en dessous, récupération et composition corporelle dégradées.
- Les calories des montres sont des estimations: juger sur la tendance de poids réelle sur 2-3 semaines.
Si les données manquent pour répondre, dis-le au lieu d'inventer. Pas de diagnostic médical.`;
function coachScreen(){
  const msgs=S.coach.slice(-12).map(m=>`<div class="card" style="${m.role==='user'?'background:var(--n-200);border:none':''}">
    <p class="muted small" style="margin-bottom:4px">${m.role==='user'?'Vous':'Coach'} · ${fmtDay(m.date)}</p>
    <div style="white-space:pre-wrap;font-size:14px">${esc(m.content)}</div></div>`).join('');
  const obs=observedTDEE();
  return `
    <div class="card">
      <b>Bilan de la semaine</b>
      <p class="ai-note">Un appel Gemini, à la demande uniquement: le coach lit vos 14 derniers jours (séances, course, nutrition, poids, sommeil) et donne des recommandations cadrées par la recherche.</p>
      <button class="btn olive small" style="margin-top:8px" ${ui.coachBusy?'disabled':''} onclick="coachWeekly()">${ui.coachBusy?'Analyse en cours…':'Lancer le bilan'}</button>
    </div>
    ${obs?`<div class="card"><b>Dépense observée (calcul local)</b>
      <p class="muted small" style="margin-top:4px">D'après votre évolution de poids et votre journal sur ${obs.days} jours (${obs.logged} jours journalisés): ~${obs.tdee} kcal/jour. Plus fiable que toute estimation si votre journal est honnête.</p></div>`:''}
    ${msgs||`<div class="empty">Posez une question ou lancez le bilan. Chaque message consomme un appel Gemini.</div>`}
    <div class="card">
      <label>Question au coach</label>
      <div class="row">
        <input type="text" id="coachQ" placeholder="Ex. Je stagne au développé couché" onkeydown="if(event.key==='Enter')coachAsk()">
        <button class="btn small" ${ui.coachBusy?'disabled':''} onclick="coachAsk()">Envoyer</button></div>
      ${S.coach.length?`<button class="btn danger small" style="margin-top:8px" onclick="coachClear()">Effacer la conversation</button>`:''}
    </div>`;
}
async function coachWeekly(){
  if(ui.coachBusy)return; ui.coachBusy=true; render();
  const txt=await geminiText(COACH_RULES+'\n\nDONNÉES:\n'+coachContext()+
    '\n\nFais un bilan: 1) ce qui va bien, 2) le point prioritaire à corriger, 3) une action concrète pour la semaine.');
  ui.coachBusy=false;
  if(txt){ S.coach.push({role:'coach',content:txt,date:localDate()}); await persist(); }
  render();
}
async function coachAsk(){
  const el=document.getElementById('coachQ'); const q=(el?el.value:'').trim();
  if(!q||ui.coachBusy)return;
  S.coach.push({role:'user',content:q,date:localDate()});
  ui.coachBusy=true; render();
  const hist=S.coach.slice(-6).map(m=>(m.role==='user'?'UTILISATEUR: ':'COACH: ')+m.content).join('\n');
  const txt=await geminiText(COACH_RULES+'\n\nDONNÉES:\n'+coachContext()+'\n\nCONVERSATION:\n'+hist+'\n\nRéponds au dernier message.');
  ui.coachBusy=false;
  if(txt){ S.coach.push({role:'coach',content:txt,date:localDate()}); }
  await persist(); render();
}
async function coachClear(){ if(!confirm('Effacer la conversation avec le coach ?'))return; S.coach=[]; await persist(); render(); }

/* =========================================================
   OBJECTIFS & RÉGLAGES
========================================================= */
function settingsScreen(){
  const st=S.settings; const b=bmr(), t=tdee(), kt=kcalTarget(), mt=macroTargets();
  const weights=[...S.weights].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  return `
    <h2>Profil</h2>
    <div class="card stack">
      <div class="grid3">
        <div><label>Sexe</label><select onchange="S.settings.sexe=this.value;persistSoon();render()">
          <option value="H" ${st.sexe==='H'?'selected':''}>Homme</option><option value="F" ${st.sexe==='F'?'selected':''}>Femme</option></select></div>
        <div><label>Âge</label><input type="number" inputmode="numeric" value="${st.age??''}" oninput="S.settings.age=+this.value||null;persistSoon()"></div>
        <div><label>Taille cm</label><input type="number" inputmode="numeric" value="${st.taille??''}" oninput="S.settings.taille=+this.value||null;persistSoon()"></div></div>
      <div><label>Niveau d'activité</label>
        <select onchange="S.settings.activite=+this.value;persistSoon();render()">
          ${[[1.2,'Sédentaire'],[1.375,'Léger (1-3 séances/sem)'],[1.55,'Modéré (3-5 séances/sem)'],[1.725,'Intense (6-7 séances/sem)']]
            .map(([v,l])=>`<option value="${v}" ${st.activite===v?'selected':''}>${l}</option>`).join('')}</select></div>
    </div>
    <h2>Poids & objectif</h2>
    <div class="card stack">
      <div class="grid2">
        <div><label>Nouveau poids kg</label><input type="number" id="wKg" inputmode="decimal" step="0.1" min="0"></div>
        <div style="display:flex;align-items:flex-end"><button class="btn olive small full" onclick="addWeight()">Enregistrer le poids</button></div></div>
      <div class="grid2">
        <div><label>Objectif de poids kg</label><input type="number" inputmode="decimal" step="0.1" value="${st.objectifPoids??''}"
          oninput="S.settings.objectifPoids=num(this.value);persistSoon()"></div>
        <div><label>Rythme kcal/jour</label>
          <select onchange="S.settings.rythme=+this.value;persistSoon();render()">
            ${[[-500,'Déficit -500'],[-300,'Déficit -300'],[0,'Maintien'],[200,'Surplus +200'],[400,'Surplus +400']]
              .map(([v,l])=>`<option value="${v}" ${st.rythme===v?'selected':''}>${l}</option>`).join('')}</select></div></div>
      ${weights.length?`<div>${weights.map(w=>`<div class="entry"><span>${fmtDay(w.date)}</span>
        <span class="row" style="gap:8px"><b>${w.kg} kg</b><button class="icon-btn" onclick="deleteWeight('${w.date}')">×</button></span></div>`).join('')}</div>`:''}
    </div>
    <h2>Macros</h2>
    <div class="card">
      <div class="grid2">
        <div><label>Protéines g/kg de poids</label><input type="number" inputmode="decimal" step="0.1" min="0.8" max="3" value="${st.protGkg}" oninput="S.settings.protGkg=num(this.value)||1.8;persistSoon()"></div>
        <div><label>Lipides % des kcal</label><input type="number" inputmode="numeric" min="15" max="45" value="${st.lipPct}" oninput="S.settings.lipPct=+this.value||30;persistSoon()"></div></div>
      <p class="muted small" style="margin-top:6px">Repères issus des méta-analyses: 1.6 à 2.2 g/kg de protéines avec entraînement en résistance (haut de fourchette en déficit), lipides 20-35 % des kcal. Les glucides prennent le reste.</p>
    </div>
    <h2>Calculs</h2>
    <div class="card">
      ${b?`<p class="small">Métabolisme de base : <b>${b} kcal</b> · Dépense totale estimée : <b>${t} kcal</b></p>
        <p class="small" style="margin-top:4px">Cible du jour : <b>${kt.kcal} kcal</b> (${kt.mode==='fitbit'?'kcal brûlées Fitbit + rythme':'estimation + rythme'})${mt?` · P ${mt.p} g · G ${mt.g} g · L ${mt.l} g`:''}</p>
        <p class="muted small" style="margin-top:6px">Formule Mifflin-St Jeor. Si vous renseignez vos kcal brûlées du jour dans Santé, la cible devient dynamique. Ajustez le rythme selon votre évolution réelle de poids sur 2-3 semaines.</p>`
      :`<p class="muted small">Renseignez sexe, âge, taille et un poids pour activer les calculs.</p>`}
    </div>
    <h2>IA</h2>
    <div class="card">
      <label>Clé API Gemini</label>
      <input type="password" value="${esc(st.geminiKey)}" placeholder="AQ.… ou AIza…" oninput="S.settings.geminiKey=this.value;persistSoon()">
      <label style="margin-top:10px">Modèle</label>
      <select onchange="S.settings.geminiModel=this.value;persistSoon()">
        ${['gemini-2.5-flash-lite','gemini-2.5-flash','gemini-2.5-pro'].map(m=>`<option value="${m}" ${(st.geminiModel||'gemini-2.5-flash-lite')===m?'selected':''}>${m}</option>`).join('')}</select>
      <p class="muted small" style="margin-top:6px">Gratuite sur aistudio.google.com. Utilisée pour la photo d'assiette, les screenshots Strava et le coach. Les appels partent directement de votre appareil vers Google. Si un appel renvoie une erreur 404, changez de modèle ici.</p>
    </div>
    <h2>Données</h2>
    <div class="card stack">
      <p class="muted small">Stockage actuel : ${Store.mode}. L'export permet de migrer entre l'artifact Claude et le fichier standalone.</p>
      <div class="row">
        <button class="btn ghost small" onclick="exportData()">Exporter JSON</button>
        <label class="btn ghost small" style="text-align:center">Importer JSON<input type="file" accept=".json" style="display:none" onchange="importData(this.files[0])"></label></div>
      <button class="btn danger small" onclick="wipeData()">Tout effacer</button>
    </div>
    <button class="btn ghost full" onclick="goTab('accueil')">← Retour</button>`;
}
async function addWeight(){
  const kg=num(document.getElementById('wKg').value);
  if(!kg){toast('Poids invalide');return;}
  const date=localDate();
  S.weights=S.weights.filter(w=>w.date!==date); S.weights.push({date,kg});
  await persist(); toast('Poids enregistré'); render();
}
async function deleteWeight(date){ S.weights=S.weights.filter(w=>w.date!==date); await persist(); render(); }
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='fitness-export-'+localDate()+'.json'; a.click(); URL.revokeObjectURL(a.href);
}
async function importData(file){
  if(!file)return;
  try{ const txt=await file.text(); const data=JSON.parse(txt);
    if(!data.settings||!Array.isArray(data.workouts)) throw new Error('format');
    if(!confirm('Remplacer toutes les données actuelles par cet export ?'))return;
    S=data; await persist(); toast('Données importées'); render();
  }catch(e){ toast('Fichier invalide'); }
}
async function wipeData(){
  if(!confirm('Effacer TOUTES les données ? Irréversible.'))return;
  S={settings:{sexe:'H',age:null,taille:null,objectifPoids:null,activite:1.55,rythme:-300,protGkg:1.8,lipPct:30,geminiKey:'',geminiModel:'gemini-2.5-flash-lite'},
     weights:[],templates:[],workouts:[],draft:null,runs:[],foods:[],meals:[],health:[],coach:[]};
  await persist(); render();
}

/* =========================================================
   DÉMARRAGE
========================================================= */
(async function init(){
  const saved=await Store.load();
  if(saved){ S={...S,...saved, settings:{...S.settings,...(saved.settings||{})}}; }
  render();
})();
</script>
