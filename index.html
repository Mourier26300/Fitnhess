<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="theme-color" content="#f5ead8">
<link rel="apple-touch-icon" href="icon.png">
<title>Fitness — architecture v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5ead8; --surface:#ebddc5; --text:#201e1d;
  --orange-100:#fff2eb; --orange-200:#ffe1d0; --orange-300:#ffc6a5; --orange:#c67139; --orange-500:#d67f48; --orange-600:#b2622d; --orange-800:#643312;
  --olive-100:#f0fae1; --olive-200:#e1eecc; --olive:#7a8a5e; --olive-600:#728157; --olive-800:#3d472b;
  --n-100:#f9f4ed; --n-200:#eee7db; --n-300:#dcd3c4; --n-500:#a19786; --n-600:#82796a; --n-700:#645c50; --n-900:#2e2b25;
  --r-sm:8px; --r-md:16px; --r-lg:28px; --r-pill:999px;
  --shadow-sm:0 1px 2px rgba(46,43,37,.07), 0 1px 1px rgba(46,43,37,.04);
  --shadow-md:0 6px 18px rgba(46,43,37,.10);
  --muted:var(--n-600); --line:var(--n-300); --accent-soft:var(--n-200); --warn:var(--orange-800);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Figtree',system-ui,-apple-system,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;text-wrap:pretty}
a{color:var(--orange-800)}
a:hover{color:var(--orange-600)}
:focus-visible{outline:2px solid var(--orange-600);outline-offset:2px}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
header.top{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 6px;gap:10px}
header.top h1{font-family:'Caprasimo',serif;font-size:24px;font-weight:400;letter-spacing:.01em}
main{flex:1;padding:14px 16px calc(96px + env(safe-area-inset-bottom))}
h2{font-size:12px;font-weight:700;margin:24px 0 10px;color:var(--n-600);text-transform:uppercase;letter-spacing:.07em}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);
  border-top:1px solid var(--n-300);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:50;box-shadow:0 -2px 10px rgba(46,43,37,.05)}
nav button{flex:1;background:none;border:none;font-size:10.5px;font-weight:600;color:var(--n-600);
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;cursor:pointer;min-height:44px;border-radius:var(--r-sm)}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--text);background:var(--n-200)}
nav button:active{transform:scale(.96)}
.card{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.stack{display:flex;flex-direction:column;gap:10px}
.muted{color:var(--n-600);font-size:13px}
.small{font-size:12px}
.btn{border:1px solid var(--text);background:var(--text);color:var(--bg);border-radius:var(--r-pill);padding:12px 20px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px;transition:transform .12s ease}
.btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;color:var(--text);border-color:var(--n-500)}
.btn.small{padding:8px 14px;font-size:13px;min-height:38px}
.btn.full{width:100%}
.btn.accent{background:var(--orange-600);border-color:var(--orange-600);color:#fff}
.btn.olive{background:var(--olive-600);border-color:var(--olive-600);color:#fff}
.btn.danger{border-color:transparent;background:none;color:var(--orange-600);text-decoration:underline;padding:8px;min-height:38px}
.icon-btn{background:var(--n-200);border:none;border-radius:var(--r-pill);width:30px;height:30px;font-size:16px;
  color:var(--n-600);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
input,select{font-family:inherit;font-size:16px;color:var(--text);background:var(--n-100);
  border:1px solid var(--n-300);border-radius:var(--r-sm);padding:11px 12px;width:100%;min-height:44px}
input:focus,select:focus{outline:2px solid var(--orange-600);border-color:var(--orange-600)}
label{font-size:11.5px;font-weight:600;color:var(--n-600);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.stat{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);padding:14px 12px}
.stat .v{font-family:'Caprasimo',serif;font-size:26px;font-weight:400;font-variant-numeric:tabular-nums}
.stat .l{font-size:10.5px;color:var(--n-600);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.03em}
.pill{display:inline-block;background:var(--orange-200);color:var(--orange-800);border-radius:var(--r-pill);font-size:12px;font-weight:700;padding:4px 11px}
.pill.olive{background:var(--olive-200);color:var(--olive-800)}
.seg{display:flex;background:var(--n-200);border-radius:var(--r-pill);padding:3px;margin:10px 0}
.seg button{flex:1;border:none;background:none;border-radius:var(--r-pill);padding:9px 0;font-size:13px;font-weight:600;color:var(--n-600);cursor:pointer;font-family:inherit;min-height:38px}
.seg button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.set-row{display:grid;grid-template-columns:32px 1fr 16px 1fr 32px;gap:8px;align-items:center;margin-bottom:7px}
.set-row input{text-align:center;padding:10px 4px}
.set-num{font-size:12px;font-weight:700;color:var(--olive-800);text-align:center;background:var(--olive-100);border-radius:var(--r-pill);padding:6px 0}
.set-x{text-align:center;color:var(--n-500)}
.set-hint{display:grid;grid-template-columns:32px 1fr 16px 1fr 32px;gap:8px;font-size:10.5px;color:var(--n-600);text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
details.hist{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);margin-bottom:9px}
details.hist summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;min-height:44px}
details.hist summary::-webkit-details-marker{display:none}
details.hist summary::after{content:'';width:8px;height:8px;border-right:1.8px solid var(--n-500);border-bottom:1.8px solid var(--n-500);transform:rotate(45deg);margin-left:6px;flex-shrink:0}
details.hist[open] summary::after{transform:rotate(-135deg)}
details.hist .body{padding:0 16px 14px}
.bar{height:9px;background:var(--n-200);border-radius:var(--r-pill);overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;background:var(--orange-500);border-radius:var(--r-pill);transition:width .3s ease}
.bar i.over{background:var(--orange-800)}
.entry{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--n-300);font-size:14px}
.entry:last-child{border-bottom:none}
.finish-bar{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:448px;z-index:40;display:flex;flex-direction:column;gap:6px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);
  padding:11px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;box-shadow:var(--shadow-md)}
.toast.show{opacity:1}
.empty{border:1.5px dashed var(--n-300);border-radius:var(--r-md);padding:26px 18px;text-align:center;color:var(--n-600);font-size:14px;margin-bottom:10px}
.chart{background:var(--surface);border:1px solid var(--n-300);border-radius:var(--r-md);padding:14px;color:var(--olive-600)}
.ai-note{font-size:12px;color:var(--n-600);margin-top:6px;line-height:1.4}
.hero-cal{background:linear-gradient(160deg,var(--orange-100),var(--surface));border:1px solid var(--orange-300);border-radius:var(--r-lg);padding:20px;margin-bottom:12px}
.hero-cal .v{font-family:'Caprasimo',serif;font-size:38px;line-height:1;margin-top:4px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:var(--n-200);color:var(--n-700);font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r-pill)}
@media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>
<div id="app">
  <header class="top"><h1 id="title"></h1><button class="btn ghost small" onclick="goTab('reglages')"><svg width="16" height="16" viewBox="0 0 24 24" style="stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;margin-right:5px" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"></path></svg>Réglages</button></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<div class="toast" id="toast"></div>
<datalist id="exo-suggestions"></datalist>
<datalist id="food-suggestions"></datalist>

<script>
/* =========================================================
   STOCKAGE
========================================================= */
const Store = (() => {
  const KEY = 'fitness-state-v2';
  const hasWS = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  async function load(){
    if (hasWS){ try { const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : null; } catch(e){ return null; } }
    try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch(e){ return null; }
  }
  async function save(state){
    const s = JSON.stringify(state);
    if (hasWS){ try { await window.storage.set(KEY, s); } catch(e){ console.warn('storage', e); } return; }
    try { localStorage.setItem(KEY, s); } catch(e){ console.warn('storage', e); }
  }
  return { load, save, mode: hasWS ? 'Claude (compte)' : 'appareil (localStorage)' };
})();

/* =========================================================
   ÉTAT
========================================================= */
let S = {
  settings: { sexe:'H', age:null, taille:null, objectifPoids:null, activite:1.55, rythme:-300, protGkg:1.8, lipPct:30, geminiKey:'' },
  weights: [],
  templates: [],
  workouts: [],
  draft: null,
  runs: [],
  foods: [],
  meals: [],
  health: [],
  coach: []
};
let view = { tab:'accueil', screen:'home', payload:null };
let ui = { nutriDate: localDate(), dashPeriod:'jour', addTo:null, photoRows:null, stravaDraft:null, offResults:null, coachBusy:false };

const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
function localDate(d){ d=d||new Date(); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
const fmtDay = iso => new Date(iso+(iso.length===10?'T12:00':'')).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
const round1 = x => Math.round(x*10)/10;
const num = v => { const n = parseFloat(String(v??'').replace(',','.')); return isNaN(n) ? null : n; };

/* MODÈLE GEMINI : Modifié en gemini-1.5-flash pour compatibilité totale avec v1 API */
const GEMINI_MODEL = 'gemini-1.5-flash';

let saveTimer = null;
function persistSoon(){ clearTimeout(saveTimer); saveTimer = setTimeout(persist, 1500); }
async function persist(){ clearTimeout(saveTimer); await Store.save(S); }
window.addEventListener('beforeunload', ()=>{ if(saveTimer) persist(); });
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden' && saveTimer) persist(); });

/* =========================================================
   CALCULS OBJECTIFS
========================================================= */
function currentWeight(){ const w=[...S.weights].sort((a,b)=>b.date.localeCompare(a.date))[0]; return w?w.kg:null; }
function bmr(){
  const st=S.settings, p=currentWeight();
  if(!p||!st.age||!st.taille) return null;
  return Math.round(10*p + 6.25*st.taille - 5*st.age + (st.sexe==='H'?5:-161));
}
function tdee(){ const b=bmr(); return b?Math.round(b*S.settings.activite):null; }
function kcalTarget(date){
  date = date || localDate();
  const rythme = +S.settings.rythme||0;
  const h = S.health.find(x=>x.date===date);
  if(h && h.calOut) return { kcal: Math.max(1200, Math.round(h.calOut + rythme)), mode:'fitbit' };
  const t = tdee();
  return t ? { kcal: Math.max(1200, t + rythme), mode:'estime' } : null;
}
function macroTargets(date){
  const kt = kcalTarget(date); const poids = currentWeight();
  if(!kt || !poids) return null;
  const p = Math.round(poids * (+S.settings.protGkg||1.8));
  const l = Math.round(kt.kcal * (+S.settings.lipPct||30)/100/9);
  const g = Math.max(0, Math.round((kt.kcal - p*4 - l*9)/4));
  return { p, g, l };
}

/* =========================================================
   GEMINI API (v1 REST, compatible clés AQ...)
========================================================= */
async function geminiJSON(promptText, file){
  const key = S.settings.geminiKey.trim();
  if(!key){ toast('Ajoutez votre clé API Gemini dans Réglages'); return null; }
  const b64 = await new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(new Error('lecture fichier')); r.readAsDataURL(file); });
  const body = {
    contents:[{parts:[{text:promptText},{inline_data:{mime_type:file.type||'image/png', data:b64}}]}],
    generationConfig:{ response_mime_type:'application/json', temperature:0.1 }
  };
  try{
    /* Passage en /v1/ au lieu de /v1beta/ */
    const resp = await fetch('https://generativelanguage.googleapis.com/v1/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(key),
      { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(!resp.ok){ toast('Gemini : erreur '+resp.status); return null; }
    const data = await resp.json();
    let txt = (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
    txt = txt.replace(/```json|```/g,'').trim();
    return JSON.parse(txt);
  }catch(e){
    console.warn(e);
    toast('Appel Gemini impossible. Vérifiez votre connexion.');
    return null;
  }
}

async function geminiText(promptText){
  const key = S.settings.geminiKey.trim();
  if(!key){ toast('Ajoutez votre clé API Gemini dans Réglages'); return null; }
  try{
    /* Passage en /v1/ au lieu de /v1beta/ */
    const resp = await fetch('https://generativelanguage.googleapis.com/v1/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(key),
      { method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ contents:[{parts:[{text:promptText}]}], generationConfig:{temperature:0.4} }) });
    if(!resp.ok){ toast('Gemini : erreur '+resp.status); return null; }
    const data = await resp.json();
    return (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim() || null;
  }catch(e){ console.warn(e); toast('Appel Gemini impossible.'); return null; }
}

/* =========================================================
   NAVIGATION / RENDU
========================================================= */
const TABS = [
  {id:'accueil', label:'Accueil'}, {id:'muscu', label:'Muscu'}, {id:'course', label:'Course'},
  {id:'sante', label:'Santé'}, {id:'nutrition', label:'Nutrition'}, {id:'coach', label:'Coach'}
];
const NAV_ICONS = {
  accueil:'<svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"></path></svg>',
  muscu:'<svg viewBox="0 0 24 24"><path d="M4 9v6M2 10v4M20 9v6M22 10v4M7 12h10"></path><rect x="5" y="8" width="3" height="8" rx="1"></rect><rect x="16" y="8" width="3" height="8" rx="1"></rect></svg>',
  course:'<svg viewBox="0 0 24 24"><path d="M3 13h3l2 6 4-12 3 8h6"></path></svg>',
  sante:'<svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 5C19 15.65 12 20 12 20Z"></path></svg>',
  nutrition:'<svg viewBox="0 0 24 24"><path d="M3 12h18a9 9 0 0 1-18 0Z"></path><path d="M12 12V4M8 6l1.5 2M16 6l-1.5 2"></path></svg>',
  coach:'<svg viewBox="0 0 24 24"><path d="M4 5h16v10H9l-4 4v-4H4Z"></path></svg>'
};
function goTab(id){ view={tab:id,screen:'home',payload:null}; render(); }
function go(screen,payload){ view.screen=screen; view.payload=payload??null; render(); }
function refreshSuggestions(){
  const ex=new Set(); S.workouts.forEach(w=>w.exercises.forEach(e=>ex.add(e.name))); S.templates.forEach(t=>t.exercises.forEach(n=>ex.add(n)));
  document.getElementById('exo-suggestions').innerHTML=[...ex].sort().map(n=>`<option value="${esc(n)}">`).join('');
  document.getElementById('food-suggestions').innerHTML=S.foods.map(f=>`<option value="${esc(f.name)}">`).join('');
}
function render(){
  refreshSuggestions();
  document.getElementById('nav').innerHTML = TABS.map(t=>
    `<button class="${view.tab===t.id?'active':''}" onclick="goTab('${t.id}')">${NAV_ICONS[t.id]}<span>${t.label}</span></button>`).join('');
  const titles={accueil:'Tableau de bord',muscu:'Muscu',course:'Course',sante:'Santé',nutrition:'Nutrition',coach:'Coach',reglages:'Objectifs & réglages'};
  document.getElementById('title').textContent = titles[view.tab]||'';
  const m=document.getElementById('main');
  if(view.tab==='accueil') m.innerHTML=dashboard();
  else if(view.tab==='muscu'){
    if(view.screen==='home') m.innerHTML=muscuHome();
    else if(view.screen==='editTemplate') m.innerHTML=templateEditor(view.payload);
    else if(view.screen==='workout') m.innerHTML=workoutScreen();
    else if(view.screen==='progress') m.innerHTML=progressScreen(view.payload);
  }
  else if(view.tab==='course') m.innerHTML=courseScreen();
  else if(view.tab==='sante') m.innerHTML=santeScreen();
  else if(view.tab==='nutrition') m.innerHTML=nutritionScreen();
  else if(view.tab==='coach') m.innerHTML=coachScreen();
  else if(view.tab==='reglages') m.innerHTML=settingsScreen();
  m.scrollTop=0;
}

/* =========================================================
   ACCUEIL
========================================================= */
function periodRange(){
  const now=new Date(); const start=new Date(now); start.setHours(0,0,0,0);
  if(ui.dashPeriod==='semaine'){ const d=(now.getDay()+6)%7; start.setDate(now.getDate()-d); }
  if(ui.dashPeriod==='mois'){ start.setDate(1); }
  return start;
}
function inPeriod(dateStr){ const d=new Date(dateStr.length===10?dateStr+'T12:00':dateStr); return d>=periodRange(); }
function tonnage(w){ return w.exercises.reduce((s,e)=>s+e.sets.reduce((x,st)=>x+(st.reps||0)*(st.weight||0),0),0); }
function dayMeals(date){ return S.meals.filter(m=>m.date===date); }
function sumMeals(list){ return list.reduce((a,m)=>({kcal:a.kcal+m.kcal,p:a.p+m.p,g:a.g+m.g,l:a.l+m.l}),{kcal:0,p:0,g:0,l:0}); }

function dashboard(){
  const wos=S.workouts.filter(w=>inPeriod(w.date));
  const runs=S.runs.filter(r=>inPeriod(r.date));
  const ton=Math.round(wos.reduce((s,w)=>s+tonnage(w),0));
  const km=round1(runs.reduce((s,r)=>s+(+r.km||0),0));
  const today=localDate();
  const eaten=sumMeals(dayMeals(today));
  const kt=kcalTarget(today);
  const target=kt?kt.kcal:null;
  const mt=macroTargets(today);
  const poids=currentWeight();
  const obj=S.settings.objectifPoids;
  const h=[...S.health].sort((a,b)=>b.date.localeCompare(a.date))[0];
  return `
    <div class="seg">
      ${['jour','semaine','mois'].map(p=>`<button class="${ui.dashPeriod===p?'active':''}" onclick="ui.dashPeriod='${p}';render()">${p[0].toUpperCase()+p.slice(1)}</button>`).join('')}
    </div>
    <div class="hero-cal">
      <div class="muted small" style="text-transform:uppercase;letter-spacing:.05em;font-weight:700">Calories aujourd'hui</div>
      ${target?`<div class="v">${Math.round(eaten.kcal)}<span style="font-size:16px;color:var(--n-600);font-family:'Figtree',sans-serif;font-weight:600"> / ${target} kcal</span></div>
      <div class="bar"><i class="${eaten.kcal>target?'over':''}" style="width:${Math.min(100,eaten.kcal/target*100)}%"></i></div>

function weightChart(){
  const pts=[...S.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(pts.length<2) return '';
  return `<h2>Poids</h2><div class="chart">${sparkline(pts.map(p=>p.kg))}</div>`;
}

function sparkline(vals){
  if(vals.length<2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const w = 300, h = 60;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 12) - 6;
    return `${x},${y}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:60px;overflow:visible"><polyline fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/></svg>`;
}

      <div class="grid2">
        <div><label>Taille (cm)</label><input type="number" id="sTaille" value="${st.taille||''}"></div>
        <div><label>Objectif Poids (kg)</label><input type="number" step="0.1" id="sObj" value="${st.objectifPoids||''}"></div>
      </div>
      <div>
        <label>Rythme Calorique (Déficit/Surplus kcal/jour)</label>
        <input type="number" id="sRythme" value="${st.rythme||-300}">
      </div>
      <button class="btn olive full" onclick="saveSettings()">Sauvegarder les Réglages</button>
    </div>`;
}

async function saveSettings(){
  S.settings.geminiKey = document.getElementById('sKey').value.trim();
  S.settings.sexe = document.getElementById('sSexe').value;
  S.settings.age = num(document.getElementById('sAge').value);
  S.settings.taille = num(document.getElementById('sTaille').value);
  S.settings.objectifPoids = num(document.getElementById('sObj').value);
  S.settings.rythme = num(document.getElementById('sRythme').value) || 0;
  await persist();
  toast('Réglages enregistrés !');
  goTab('accueil');
}

/* =========================================================
   INITIALISATION
========================================================= */
(async function init(){
  const saved = await Store.load();
  if(saved) { S = Object.assign(S, saved); }
  render();
})();
</script>
</body>
</html>
